version: 2

models:
  - name: int_ownership_details
    description: >
      Combines ownership, user, and domain data, providing a comprehensive dataset for exploratory analysis.
    columns:
      - name: entity_urn
        description: Unique identifier for datasets or dashboards.
        tests:
          - not_null
      - name: entity_type
        description: Type of the entity (e.g., dataset, dashboard).
      - name: owner_user_name
        description: Username of the owner.
        tests:
          - not_null        
      - name: owner_title
        description: Job title of the owner.
      - name: owner_name
        description: Full name of the owner
      - name: associated_domain
        description: Domain name associated with the entity.
        tests:
          - not_null
      - name: department_name
        description: Department name the owner of the dataset/dashboard belongs to.